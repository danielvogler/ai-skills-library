name: Stale Issues and PRs

on:
  schedule:
    - cron: "0 9 * * 1"  # Mondays at 09:00 UTC

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has had no activity for 30 days and will be closed in 7 days
            unless there is new activity. If this is still relevant, please comment
            or remove the stale label.
          stale-pr-message: >
            This PR has had no activity for 30 days and will be closed in 7 days.
            If you are still working on it, please push an update or comment.
          exempt-issue-labels: "pinned,upstream-source"
          exempt-pr-labels: "pinned"
