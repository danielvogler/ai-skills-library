name: Lint Markdown

on:
  push:
    paths:
      - "*.md"
  pull_request:
    paths:
      - "*.md"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint repo docs (not upstream skill files)
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          config: .markdownlint.json
          globs: |
            README.md
            AGENTS.md
            CONTRIBUTING.md
            CHANGELOG.md
            SECURITY.md
            CODE_OF_CONDUCT.md
