name: Check Profiles

on:
  push:
    paths:
      - "profiles/**"
      - ".claude/skills/**"
      - "skills-lock.json"
  pull_request:
    paths:
      - "profiles/**"
      - ".claude/skills/**"
      - "skills-lock.json"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify all profile skill references exist
        run: |
          failed=0
          for profile in profiles/*.json; do
            echo "Checking $profile..."
            while IFS= read -r skill; do
              if [ ! -d ".claude/skills/$skill" ]; then
                echo "::error file=$profile::Skill '$skill' not found in .claude/skills/"
                failed=1
              fi
            done < <(jq -r '.skills[]' "$profile")
          done
          exit $failed

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check full-stack profile is in sync with skills-lock.json
        run: |
          bash scripts/generate-full-stack.sh
          if ! git diff --exit-code profiles/full-stack.json; then
            echo ""
            echo "::error::profiles/full-stack.json is out of sync with skills-lock.json."
            echo "Run scripts/generate-full-stack.sh locally and commit the result."
            exit 1
          fi
